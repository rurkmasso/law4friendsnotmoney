<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Ligi4Friends</title>
  <script>
    // SPA redirect for GitHub Pages
    // Converts /ligi4friends/laws/Kap.%20154/ to /ligi4friends/?p=/laws/Kap.%20154/
    var pathSegmentsToKeep = 1; // /ligi4friends is the basePath
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/' +
      '?p=' + encodeURIComponent(
        '/' + l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/')
      ) +
      (l.search ? '&q=' + encodeURIComponent(l.search.slice(1)) : '') +
      l.hash
    );
  </script>
</head>
<body>
</body>
</html>
